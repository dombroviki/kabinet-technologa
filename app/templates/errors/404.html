{% extends "base.html" %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:50vh; text-align:center; gap:16px;">
    <div style="font-size:4rem; line-height:1;">🔍</div>
    <h1 style="font-size:3rem; font-weight:800; color:var(--accent); margin:0;">404</h1>
    <p style="font-size:1.1rem; color:var(--text2); margin:0;">Страница не найдена</p>
    <p style="font-size:0.88rem; color:var(--muted); max-width:360px; margin:0;">
        Возможно, ссылка устарела или страница была удалена.
    </p>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="{{ url_for('index') }}" class="btn btn-primary" style="width:148px; height:40px; margin:0; box-sizing:border-box;">🏠 На главную</a>
        <button onclick="history.back()" class="btn btn-secondary" style="width:148px; height:40px; box-sizing:border-box;">← Назад</button>
    </div>
</div>
{% endblock %}
