{% extends "base.html" %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px;">
    <h1 style="margin:0;">Бренды телевизоров</h1>
    <div style="display:flex; gap:8px;">
        <a href="{{ url_for('export_production') }}" class="btn btn-secondary">⬇ Экспорт xlsx</a>
        <a href="{{ url_for('import_all') }}" class="btn btn-secondary">⬆ Импорт</a>
    </div>
</div>
<div class="brands-grid">
    {% for brand in brands %}
        <div class="brand-card">
            <div class="brand-top-bar"></div>
            <a href="{{ url_for('brand_detail', brand_id=brand.id) }}" class="brand-link">
                <div class="brand-icon">📺</div>
                <div class="brand-name">{{ brand.name }}</div>
                <div class="brand-count">
                    <span class="count-dot"></span>
                    {{ brand.tv_models|length }} моделей
                </div>
            </a>
        </div>
    {% else %}
        <div class="empty-state" style="grid-column:1/-1">
            <span class="empty-icon">📭</span>
            <p>Бренды ещё не добавлены</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
