{% extends "base.html" %}
{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('index') }}">Главная</a>
    <span class="sep">›</span>
    <a href="{{ url_for('admin.brands') }}">Бренды</a>
    <span class="sep">›</span>
    <span class="current">{% if action == 'create' %}Новый бренд{% else %}Редактирование{% endif %}</span>
</div>

<h1>{% if action == 'create' %}Новый бренд{% else %}Редактирование: {{ brand.name }}{% endif %}</h1>

<div class="form-card" style="max-width:480px;">
    <form method="POST">
        <div class="form-group">
            <label for="name">Название бренда *</label>
            <input type="text" id="name" name="name"
                   value="{{ brand.name if brand else '' }}"
                   placeholder="например: Samsung" required autofocus>
        </div>
        <div class="form-actions">
            <button type="submit">💾 {% if action == 'create' %}Создать{% else %}Сохранить{% endif %}</button>
            <a href="{{ url_for('admin.brands') }}" class="cancel-link">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
