{% extends "base.html" %}
{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('index') }}">Главная</a>
    <span class="sep">›</span>
    <span class="current">Лаунчеры</span>
</div>

<div class="models-header">
    <h1 style="margin-bottom:0;">Типы лаунчеров</h1>
    <a href="{{ url_for('admin.create_launcher') }}" class="btn btn-primary">+ Добавить лаунчер</a>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th><span class="sort-link">Название</span></th>
                <th><span class="sort-link">Моделей</span></th>
                <th><span class="sort-link">Действия</span></th>
            </tr>
        </thead>
        <tbody>
            {% for launcher, model_count in launchers %}
            <tr>
                <td>
                    <span class="model-badge">
                        <span class="model-dot" style="background:var(--accent2); box-shadow:0 0 7px var(--accent2);"></span>
                        {{ launcher.name }}
                    </span>
                </td>
                <td>
                    <span class="lot-chip">{{ model_count }}</span>
                </td>
                <td>
                    <div class="actions-cell">
                        <a href="{{ url_for('admin.edit_launcher', launcher_id=launcher.id) }}" class="btn btn-secondary btn-sm" title="Редактировать">✏️</a>
                        <button class="btn btn-danger btn-sm"
                                data-delete-url="{{ url_for('admin.delete_launcher', launcher_id=launcher.id) }}"
                                onclick="showDeleteModal(this.dataset.deleteUrl, {{ model_count }})"
                                title="Удалить">🗑</button>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align:center; padding:40px; color:var(--muted);">
                    Лаунчеров пока нет
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div style="margin-top:24px;">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">← Главная</a>
</div>
{% endblock %}

<script>
function showDeleteModal(url, modelCount) {
    document.getElementById('deleteForm').action = url;
    if (modelCount > 0) {
        document.querySelector('#deleteModal p').innerHTML =
            'Это действие нельзя отменить.<br>Вместе с лаунчером будут удалены <strong>' + modelCount + '</strong> ' +
            (modelCount === 1 ? 'модель' : modelCount < 5 ? 'модели' : 'моделей') + ' и все их файлы.<br>Вы уверены?';
    } else {
        document.querySelector('#deleteModal p').innerHTML = 'Это действие нельзя отменить.<br>Вы уверены?';
    }
    document.getElementById('deleteModal').style.display = 'block';
}
</script>
